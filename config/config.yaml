embeddings:
  text_model: sentence-transformers/all-MiniLM-L6-v2
  image_model: clip-ViT-B-32

retrieval:
  top_k: 3
  recall_k: 3

chroma:
  text_collection: fitness_text
  image_collection: fitness_images
  persist_directory: data/chroma

llm:
  # Set model to qwen/quinn/quen/ollama to use local Ollama, or gemini to use
  # the Gemini API. API keys belong in .env, never in this file.
  model: qwen
  primary_model: qwen2.5:7b
  secondary_model: llama3.1:8b
  ollama_base_url: http://localhost:11434
  gemini_model: gemini-2.5-flash
  gemini_api_key_env: GEMINI_API_KEY

evaluation:
  random_seed: 42
  results_path: data/eval/results.csv
  rejected_rows_path: data/eval/rejected_rows.csv
